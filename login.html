<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1">

<title>Admin Login</title>

<link
rel="stylesheet"
href="./login.css">

</head>

<body>

<div class="container">

    <!-- HEADER -->

    <div class="header">

        <img
        src="./logo.png"
        class="logo">

        <div>

            <h2>
            NR SOFTECH(I) PVT LTD
            </h2>

            <p>
            Hyderabad, Telangana
            </p>

        </div>

    </div>


    <!-- PASTE LOGIN BOX HERE -->

    <div class="login-box">

    <h2>
    ADMIN LOGIN
    </h2>

    <label>
    Admin ID
    </label>

    <input
    type="text"
    id="admin_id"
    placeholder="Enter Admin ID">


    <label>
    Password
    </label>

    <input
    type="password"
    id="password"
    placeholder="Enter Password">


   <button
type="button"
onclick="login()">

LOGIN

</button>


    <div class="forgot-password">

    <a href="#"
    onclick="forgotPassword()">

    Forgot Password?

    </a>

    </div>
<p id="error" style="color:red;"></p>

    </div>

</div>


<script
src="./login.js">
</script>

</body>
</html>
